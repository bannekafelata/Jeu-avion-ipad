<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeu d'avion</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #87ceeb, #dff6ff);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: linear-gradient(to bottom, #7ec8ff, #eaf8ff);
      border: 3px solid #222;
    }

    .info {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="info" id="info">Score: 0 | Vies: 3</div>
  <canvas id="game" width="900" height="550"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const info = document.getElementById("info");

    const keys = {};

    const player = {
      x: 100,
      y: 260,
      width: 60,
      height: 30,
      speed: 5,
      lives: 3
    };

    const bullets = [];
    const missiles = [];
    const clouds = [];

    let score = 0;
    let gameOver = false;
    let missileSpawnTimer = 0;
    let cloudSpawnTimer = 0;

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;

      if (e.key === " " && !gameOver) {
        bullets.push({
          x: player.x + player.width,
          y: player.y + player.height / 2 - 3,
          width: 14,
          height: 6,
          speed: 8
        });
      }

      if (e.key === "Enter" && gameOver) {
        restartGame();
      }
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function drawPlayer() {
      // corps
      ctx.fillStyle = "#d62828";
      ctx.fillRect(player.x, player.y + 8, player.width, 14);

      // nez
      ctx.beginPath();
      ctx.moveTo(player.x + player.width, player.y + 8);
      ctx.lineTo(player.x + player.width + 16, player.y + 15);
      ctx.lineTo(player.x + player.width, player.y + 22);
      ctx.closePath();
      ctx.fill();

      // aile
      ctx.fillStyle = "#a4161a";
      ctx.beginPath();
      ctx.moveTo(player.x + 20, player.y + 10);
      ctx.lineTo(player.x + 5, player.y - 8);
      ctx.lineTo(player.x + 28, player.y + 10);
      ctx.closePath();
      ctx.fill();

      // aile basse
      ctx.beginPath();
      ctx.moveTo(player.x + 20, player.y + 20);
      ctx.lineTo(player.x + 5, player.y + 38);
      ctx.lineTo(player.x + 28, player.y + 20);
      ctx.closePath();
      ctx.fill();

      // cockpit
      ctx.fillStyle = "#1d3557";
      ctx.fillRect(player.x + 36, player.y + 10, 12, 10);
    }

    function drawBullets() {
      ctx.fillStyle = "#ffb703";
      for (const bullet of bullets) {
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
      }
    }

    function drawMissiles() {
      for (const missile of missiles) {
        // corps
        ctx.fillStyle = "#555";
        ctx.fillRect(missile.x, missile.y, missile.width, missile.height);

        // pointe
        ctx.beginPath();
        ctx.moveTo(missile.x, missile.y);
        ctx.lineTo(missile.x - 12, missile.y + missile.height / 2);
        ctx.lineTo(missile.x, missile.y + missile.height);
        ctx.closePath();
        ctx.fill();

        // flammes
        ctx.fillStyle = "#ff6b00";
        ctx.beginPath();
        ctx.moveTo(missile.x + missile.width, missile.y + 3);
        ctx.lineTo(missile.x + missile.width + 10, missile.y + missile.height / 2);
        ctx.lineTo(missile.x + missile.width, missile.y + missile.height - 3);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawClouds() {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      for (const cloud of clouds) {
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, 18, 0, Math.PI * 2);
        ctx.arc(cloud.x + 20, cloud.y - 8, 16, 0, Math.PI * 2);
        ctx.arc(cloud.x + 36, cloud.y, 18, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function updatePlayer() {
      if (keys["ArrowUp"]) player.y -= player.speed;
      if (keys["ArrowDown"]) player.y += player.speed;
      if (keys["ArrowLeft"]) player.x -= player.speed;
      if (keys["ArrowRight"]) player.x += player.speed;

      if (player.x < 0) player.x = 0;
      if (player.y < 0) player.y = 0;
      if (player.x + player.width + 16 > canvas.width) {
        player.x = canvas.width - player.width - 16;
      }
      if (player.y + player.height + 8 > canvas.height) {
        player.y = canvas.height - player.height - 8;
      }
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].speed;
        if (bullets[i].x > canvas.width) {
          bullets.splice(i, 1);
        }
      }
    }

    function spawnMissile() {
      missiles.push({
        x: canvas.width + 20,
        y: Math.random() * (canvas.height - 30),
        width: 34,
        height: 12,
        speed: 3 + Math.random() * 2
      });
    }

    function updateMissiles() {
      missileSpawnTimer++;
      if (missileSpawnTimer > 40) {
        spawnMissile();
        missileSpawnTimer = 0;
      }

      for (let i = missiles.length - 1; i >= 0; i--) {
        missiles[i].x -= missiles[i].speed;

        if (missiles[i].x + missiles[i].width < 0) {
          missiles.splice(i, 1);
          continue;
        }

        if (isColliding(player, missiles[i])) {
          missiles.splice(i, 1);
          player.lives--;
          if (player.lives <= 0) {
            gameOver = true;
          }
        }
      }
    }

    function spawnCloud() {
      clouds.push({
        x: canvas.width + 50,
        y: 40 + Math.random() * (canvas.height - 80),
        speed: 1 + Math.random()
      });
    }

    function updateClouds() {
      cloudSpawnTimer++;
      if (cloudSpawnTimer > 90) {
        spawnCloud();
        cloudSpawnTimer = 0;
      }

      for (let i = clouds.length - 1; i >= 0; i--) {
        clouds[i].x -= clouds[i].speed;
        if (clouds[i].x < -80) {
          clouds.splice(i, 1);
        }
      }
    }

    function checkBulletHits() {
      for (let i = missiles.length - 1; i >= 0; i--) {
        for (let j = bullets.length - 1; j >= 0; j--) {
          if (isColliding(bullets[j], missiles[i])) {
            missiles.splice(i, 1);
            bullets.splice(j, 1);
            score += 10;
            break;
          }
        }
      }
    }

    function isColliding(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function drawGround() {
      ctx.fillStyle = "#7fb069";
      ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#fff";
      ctx.font = "bold 48px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 20);

      ctx.font = "28px Arial";
      ctx.fillText("Appuie sur Entrée pour recommencer", canvas.width / 2, canvas.height / 2 + 35);
    }

    function updateInfo() {
      info.textContent = `Score: ${score} | Vies: ${player.lives}`;
    }

    function restartGame() {
      player.x = 100;
      player.y = 260;
      player.lives = 3;
      bullets.length = 0;
      missiles.length = 0;
      clouds.length = 0;
      score = 0;
      gameOver = false;
      missileSpawnTimer = 0;
      cloudSpawnTimer = 0;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      updateClouds();
      drawClouds();
      drawGround();

      if (!gameOver) {
        updatePlayer();
        updateBullets();
        updateMissiles();
        checkBulletHits();
      }

      drawPlayer();
      drawBullets();
      drawMissiles();
      updateInfo();

      if (gameOver) {
        drawGameOver();
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
