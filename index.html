<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avion des Montagnes</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#87ceeb}
canvas{display:block;width:100vw;height:100vh;background:linear-gradient(#58bfff,#eaf8ff)}
#hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:white;padding:10px 18px;border-radius:14px;font-weight:bold;font-size:20px}
#menu,#gameover{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.45);color:white;z-index:10;text-align:center}
button{font-size:26px;padding:15px 30px;border:0;border-radius:16px;font-weight:bold;background:orange;color:white}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="hud">Score : 0 | Vies : 3</div>

<div id="menu">
  <h1>✈️ Avion des Montagnes</h1>
  <p>Flèches pour bouger · Espace pour tirer</p>
  <button onclick="startGame()">Commencer</button>
</div>

<div id="gameover" class="hidden">
  <h1>Game Over</h1>
  <p id="finalScore"></p>
  <p>Appuie sur Entrée pour rejouer</p>
  <button onclick="restartGame()">Rejouer</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const hud=document.getElementById("hud");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let started=false, gameOver=false, score=0, spawn=0, difficulty=3;
const player={x:90,y:250,w:65,h:32,s:6,lives:3};
const bullets=[];
const missiles=[];
const keys={};

let audioCtx;
let musicInterval;

document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(e.key===" "){
    e.preventDefault();
    shoot();
  }

  if(e.key==="Enter" && gameOver){
    restartGame();
  }
});

document.addEventListener("keyup",e=>{
  keys[e.key]=false;
});

function startGame(){
  document.getElementById("menu").classList.add("hidden");
  started=true;
  startMusic();
}

function startMusic(){
  if(audioCtx)return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();

  const melody=[440,520,660,520,740,660,520,440];
  let i=0;

  musicInterval=setInterval(()=>{
    if(!started||gameOver)return;

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type="square";
    osc.frequency.value=melody[i%melody.length];

    gain.gain.setValueAtTime(0.04,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.18);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+0.18);

    i++;
  },170);
}

function shoot(){
  if(!started||gameOver)return;
  bullets.push({x:player.x+player.w+12,y:player.y+15,w:18,h:6,s:10});
}

function restartGame(){
  document.getElementById("gameover").classList.add("hidden");
  player.x=90;
  player.y=250;
  player.lives=3;
  bullets.length=0;
  missiles.length=0;
  score=0;
  spawn=0;
  difficulty=3;
  gameOver=false;
  started=true;
}

function drawMountains(){
  ctx.fillStyle="#666";
  ctx.beginPath();
  ctx.moveTo(0,canvas.height);
  ctx.lineTo(180,canvas.height-260);
  ctx.lineTo(360,canvas.height);
  ctx.lineTo(550,canvas.height-310);
  ctx.lineTo(760,canvas.height);
  ctx.lineTo(980,canvas.height-240);
  ctx.lineTo(canvas.width,canvas.height);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(180,canvas.height-260);
  ctx.lineTo(135,canvas.height-195);
  ctx.lineTo(225,canvas.height-195);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(550,canvas.height-310);
  ctx.lineTo(495,canvas.height-230);
  ctx.lineTo(605,canvas.height-230);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#3fa34d";
  ctx.fillRect(0,canvas.height-45,canvas.width,45);
}

function drawPlayer(){
  ctx.fillStyle="red";
  ctx.fillRect(player.x,player.y+9,player.w,15);

  ctx.beginPath();
  ctx.moveTo(player.x+player.w,player.y+9);
  ctx.lineTo(player.x+player.w+22,player.y+16);
  ctx.lineTo(player.x+player.w,player.y+24);
  ctx.fill();

  ctx.fillStyle="darkred";
  ctx.beginPath();
  ctx.moveTo(player.x+22,player.y+10);
  ctx.lineTo(player.x+4,player.y-15);
  ctx.lineTo(player.x+34,player.y+10);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(player.x+22,player.y+24);
  ctx.lineTo(player.x+4,player.y+48);
  ctx.lineTo(player.x+34,player.y+24);
  ctx.fill();

  ctx.fillStyle="navy";
  ctx.fillRect(player.x+40,player.y+11,13,10);
}

function drawMissiles(){
  missiles.forEach(m=>{
    ctx.fillStyle="#333";
    ctx.fillRect(m.x,m.y,m.w,m.h);

    ctx.beginPath();
    ctx.moveTo(m.x,m.y);
    ctx.lineTo(m.x-14,m.y+m.h/2);
    ctx.lineTo(m.x,m.y+m.h);
    ctx.fill();

    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.moveTo(m.x+m.w,m.y+2);
    ctx.lineTo(m.x+m.w+14,m.y+m.h/2);
    ctx.lineTo(m.x+m.w,m.y+m.h-2);
    ctx.fill();
  });
}

function update(){
  if(!started||gameOver)return;

  if(keys["ArrowUp"])player.y-=player.s;
  if(keys["ArrowDown"])player.y+=player.s;
  if(keys["ArrowLeft"])player.x-=player.s;
  if(keys["ArrowRight"])player.x+=player.s;

  player.x=Math.max(0,Math.min(canvas.width-player.w-25,player.x));
  player.y=Math.max(0,Math.min(canvas.height-95,player.y));

  bullets.forEach(b=>b.x+=b.s);
  for(let i=bullets.length-1;i>=0;i--){
    if(bullets[i].x>canvas.width)bullets.splice(i,1);
  }

  spawn++;
  if(spawn>38){
    missiles.push({
      x:canvas.width+30,
      y:Math.random()*(canvas.height-120)+30,
      w:40,
      h:14,
      s:difficulty+Math.random()*2
    });
    spawn=0;
    difficulty+=0.025;
  }

  missiles.forEach(m=>m.x-=m.s);

  for(let i=missiles.length-1;i>=0;i--){
    if(hit(player,missiles[i])){
      missiles.splice(i,1);
      player.lives--;
      if(player.lives<=0)endGame();
    }
  }

  for(let i=missiles.length-1;i>=0;i--){
    for(let j=bullets.length-1;j>=0;j--){
      if(hit(bullets[j],missiles[i])){
        missiles.splice(i,1);
        bullets.splice(j,1);
        score+=10;
        break;
      }
    }
  }

  hud.textContent=`Score : ${score} | Vies : ${player.lives}`;
}

function hit(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function endGame(){
  gameOver=true;
  document.getElementById("finalScore").textContent="Score final : "+score;
  document.getElementById("gameover").classList.remove("hidden");
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawMountains();
  update();

  drawPlayer();

  ctx.fillStyle="gold";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  drawMissiles();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
