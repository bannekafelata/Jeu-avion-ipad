<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu Avion Montagnes</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#87ceeb;touch-action:none}
canvas{display:block;width:100vw;height:70vh;background:linear-gradient(#78c9ff,#eaf8ff)}
#hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:white;padding:10px 15px;border-radius:12px;font-weight:bold}
#menu,#gameover{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.45);color:white;z-index:10}
button{font-size:24px;padding:15px 25px;border:0;border-radius:15px;font-weight:bold}
.controls{position:fixed;bottom:15px;left:0;right:0;display:flex;justify-content:space-around;align-items:center}
.pad{display:grid;grid-template-columns:65px 65px 65px;gap:7px}
.btn{background:white}
.fire{background:orange;color:white;border-radius:50%;width:110px;height:110px}
.hidden{display:none!important}
.empty{visibility:hidden}
</style>
</head>
<body>

<div id="hud">Score : 0 | Vies : 3</div>

<div id="menu">
  <h1>✈️ Avion des Montagnes</h1>
  <button onclick="startGame()">Commencer</button>
</div>

<div id="gameover" class="hidden">
  <h1>Game Over</h1>
  <p id="finalScore"></p>
  <button onclick="restartGame()">Rejouer</button>
</div>

<canvas id="game"></canvas>

<div class="controls">
  <div class="pad">
    <div class="empty"></div><button class="btn" id="up">▲</button><div class="empty"></div>
    <button class="btn" id="left">◀</button><div class="empty"></div><button class="btn" id="right">▶</button>
    <div class="empty"></div><button class="btn" id="down">▼</button><div class="empty"></div>
  </div>
  <button class="fire" id="fire">TIR</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const hud=document.getElementById("hud");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight*0.7;
}
resize();
addEventListener("resize",resize);

let started=false, gameOver=false, score=0, spawn=0, difficulty=3;

const player={x:80,y:160,w:60,h:30,s:5,lives:3};
const bullets=[];
const missiles=[];
const keys={up:false,down:false,left:false,right:false};

let audioCtx;

function playMusic(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  function note(freq,time){
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.frequency.value=freq;
    osc.type="square";
    gain.gain.value=0.03;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time+0.18);
  }
  setInterval(()=>{
    if(!started||gameOver)return;
    const t=audioCtx.currentTime;
    note(440,t);
    note(660,t+0.25);
    note(550,t+0.5);
  },900);
}

function startGame(){
  document.getElementById("menu").classList.add("hidden");
  started=true;
  playMusic();
}

function restartGame(){
  document.getElementById("gameover").classList.add("hidden");
  player.x=80; player.y=160; player.lives=3;
  bullets.length=0; missiles.length=0;
  score=0; spawn=0; difficulty=3;
  gameOver=false; started=true;
}

function bind(id,key){
  const el=document.getElementById(id);
  el.addEventListener("touchstart",e=>{e.preventDefault();keys[key]=true},{passive:false});
  el.addEventListener("touchend",e=>{e.preventDefault();keys[key]=false},{passive:false});
  el.addEventListener("touchcancel",e=>{e.preventDefault();keys[key]=false},{passive:false});
}
bind("up","up"); bind("down","down"); bind("left","left"); bind("right","right");

document.getElementById("fire").addEventListener("touchstart",e=>{
  e.preventDefault();
  shoot();
},{passive:false});

function shoot(){
  if(!started||gameOver)return;
  bullets.push({x:player.x+player.w+10,y:player.y+14,w:15,h:6,s:9});
}

function mountains(){
  ctx.fillStyle="#7b7b7b";
  ctx.beginPath();
  ctx.moveTo(0,canvas.height-20);
  ctx.lineTo(160,canvas.height-190);
  ctx.lineTo(320,canvas.height-20);
  ctx.lineTo(480,canvas.height-210);
  ctx.lineTo(680,canvas.height-20);
  ctx.lineTo(850,canvas.height-170);
  ctx.lineTo(canvas.width,canvas.height-20);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(160,canvas.height-190);
  ctx.lineTo(125,canvas.height-150);
  ctx.lineTo(195,canvas.height-150);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#4caf50";
  ctx.fillRect(0,canvas.height-25,canvas.width,25);
}

function drawPlayer(){
  ctx.fillStyle="red";
  ctx.fillRect(player.x,player.y+8,player.w,14);
  ctx.beginPath();
  ctx.moveTo(player.x+player.w,player.y+8);
  ctx.lineTo(player.x+player.w+18,player.y+15);
  ctx.lineTo(player.x+player.w,player.y+22);
  ctx.fill();
  ctx.fillStyle="darkred";
  ctx.beginPath();
  ctx.moveTo(player.x+20,player.y+10);
  ctx.lineTo(player.x,player.y-10);
  ctx.lineTo(player.x+30,player.y+10);
  ctx.fill();
  ctx.fillStyle="navy";
  ctx.fillRect(player.x+38,player.y+10,12,10);
}

function drawMissiles(){
  missiles.forEach(m=>{
    ctx.fillStyle="#444";
    ctx.fillRect(m.x,m.y,m.w,m.h);
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.moveTo(m.x+m.w,m.y+2);
    ctx.lineTo(m.x+m.w+12,m.y+m.h/2);
    ctx.lineTo(m.x+m.w,m.y+m.h-2);
    ctx.fill();
  });
}

function update(){
  if(!started||gameOver)return;

  if(keys.up)player.y-=player.s;
  if(keys.down)player.y+=player.s;
  if(keys.left)player.x-=player.s;
  if(keys.right)player.x+=player.s;

  player.x=Math.max(0,Math.min(canvas.width-player.w-20,player.x));
  player.y=Math.max(0,Math.min(canvas.height-70,player.y));

  bullets.forEach(b=>b.x+=b.s);
  for(let i=bullets.length-1;i>=0;i--) if(bullets[i].x>canvas.width) bullets.splice(i,1);

  spawn++;
  if(spawn>40){
    missiles.push({
      x:canvas.width+20,
      y:Math.random()*(canvas.height-80),
      w:35,h:12,
      s:difficulty+Math.random()*2
    });
    spawn=0;
    difficulty+=0.03;
  }

  missiles.forEach(m=>m.x-=m.s);

  for(let i=missiles.length-1;i>=0;i--){
    if(hit(player,missiles[i])){
      missiles.splice(i,1);
      player.lives--;
      if(player.lives<=0) endGame();
    }
  }

  for(let i=missiles.length-1;i>=0;i--){
    for(let j=bullets.length-1;j>=0;j--){
      if(hit(bullets[j],missiles[i])){
        missiles.splice(i,1);
        bullets.splice(j,1);
        score+=10;
        break;
      }
    }
  }

  hud.textContent=`Score : ${score} | Vies : ${player.lives}`;
}

function hit(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function endGame(){
  gameOver=true;
  document.getElementById("finalScore").textContent="Score final : "+score;
  document.getElementById("gameover").classList.remove("hidden");
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  mountains();

  update();

  drawPlayer();

  ctx.fillStyle="gold";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  drawMissiles();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
